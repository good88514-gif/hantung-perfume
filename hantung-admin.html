<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>涵糖 HANTUNG｜預約管理後台</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold:      #c9a84c;
  --gold-lt:   #e8c97a;
  --gold-dk:   #8a6d2f;
  --gold-glow: rgba(201,168,76,.14);
  --gold-bdr:  rgba(201,168,76,.28);
  --bg:        #060606;
  --bg2:       #0e0e0e;
  --soft:      #f0ead8;
  --muted:     #6e6e6e;
  --ease:      cubic-bezier(.25,.46,.45,.94);
  --green:     #4caf70;
  --red:       #e05252;
  --blue:      #4c8bc9;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{
  background:var(--bg);color:var(--soft);
  font-family:"Noto Serif TC",Georgia,serif;
  min-height:100svh;width:100%;overflow-x:hidden;
}

/* HEADER */
.admin-header{
  background:linear-gradient(135deg,rgba(14,12,8,.98),rgba(8,7,4,.99));
  border-bottom:1px solid var(--gold-bdr);
  padding:1rem 1.4rem;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:0 4px 32px rgba(0,0,0,.6);
}
.admin-logo{
  font-family:Cinzel,serif;font-size:clamp(.56rem,1.8vw,.68rem);
  letter-spacing:.32em;color:var(--gold);text-transform:uppercase;
}
.admin-logo span{
  font-family:"Cormorant Garamond",serif;font-size:clamp(.95rem,3vw,1.15rem);
  font-weight:300;letter-spacing:.1em;display:block;color:var(--soft);
}
.header-right{display:flex;align-items:center;gap:.8rem;}
.header-badge{
  font-family:Cinzel,serif;font-size:.44rem;letter-spacing:.2em;
  color:var(--muted);text-transform:uppercase;
  border:1px solid rgba(201,168,76,.18);padding:.3rem .75rem;border-radius:40px;
}
.header-note{
  font-family:Cinzel,serif;font-size:.42rem;letter-spacing:.12em;
  color:var(--gold-dk);
  background:rgba(201,168,76,.06);
  border:1px solid rgba(201,168,76,.15);
  padding:.28rem .7rem;border-radius:40px;
  white-space:nowrap;
}

/* MAIN */
.main{max-width:1100px;margin:0 auto;padding:1.8rem 1rem 4rem;}

/* NOTICE BANNER */
.notice-banner{
  display:flex;align-items:flex-start;gap:.9rem;
  background:rgba(201,168,76,.06);
  border:1px solid rgba(201,168,76,.18);
  border-radius:12px;
  padding:1rem 1.2rem;
  margin-bottom:1.8rem;
}
.notice-icon{color:var(--gold);font-size:1rem;flex-shrink:0;margin-top:.05rem;}
.notice-text{
  font-family:"Cormorant Garamond",serif;
  font-size:clamp(.8rem,2.5vw,.88rem);
  color:var(--muted);line-height:1.85;
}
.notice-text strong{color:var(--gold-lt);font-weight:400;}

/* STATS BAR */
.stats-bar{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
  gap:.8rem;margin-bottom:1.8rem;
}
.stat-card{
  background:linear-gradient(135deg,rgba(20,18,14,.95),rgba(12,11,8,.97));
  border:1px solid var(--gold-bdr);border-radius:12px;
  padding:1rem 1.1rem;text-align:center;
}
.stat-num{
  font-family:"Cormorant Garamond",serif;
  font-size:clamp(1.4rem,4vw,1.8rem);font-weight:300;
  letter-spacing:.04em;color:var(--gold);
}
.stat-label{
  font-family:Cinzel,serif;font-size:.4rem;letter-spacing:.2em;
  color:var(--muted);text-transform:uppercase;margin-top:.3rem;
}

/* TOOLBAR */
.toolbar{
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:.8rem;margin-bottom:1.2rem;
}
.toolbar-left{display:flex;align-items:center;gap:.7rem;flex-wrap:wrap;}
.filter-input{
  background:rgba(8,8,8,.85);border:1px solid var(--gold-bdr);
  border-radius:8px;color:var(--soft);padding:.55rem .8rem;
  font-family:"Noto Serif TC",serif;font-size:max(14px,.78rem);
  outline:none;transition:border-color .3s;width:170px;
}
.filter-input:focus{border-color:var(--gold);}
.filter-input::placeholder{color:#3c3c3c;}
.filter-sel{
  background:rgba(8,8,8,.85);border:1px solid var(--gold-bdr);
  border-radius:8px;color:var(--soft);padding:.55rem .8rem;
  font-family:"Noto Serif TC",serif;font-size:max(14px,.78rem);
  outline:none;-webkit-appearance:none;cursor:pointer;
}
.filter-sel option{background:#0e0e0e;}
.btn-tool{
  font-family:Cinzel,serif;font-size:.46rem;letter-spacing:.14em;
  text-transform:uppercase;color:var(--gold);
  background:transparent;border:1px solid var(--gold-bdr);
  padding:.52rem 1rem;border-radius:40px;cursor:pointer;
  transition:all .3s var(--ease);white-space:nowrap;
}
.btn-tool:hover{background:var(--gold-glow);border-color:var(--gold);}
.btn-tool.refresh{border-color:rgba(201,168,76,.4);}

/* TABLE */
.table-wrap{
  background:linear-gradient(160deg,rgba(16,14,10,.97),rgba(10,9,6,.98));
  border:1px solid var(--gold-bdr);border-radius:16px;
  overflow:hidden;
}
.table-scroll{overflow-x:auto;}
.booking-table{
  width:100%;border-collapse:collapse;min-width:720px;
}
.booking-table th{
  font-family:Cinzel,serif;font-size:.42rem;letter-spacing:.18em;
  color:var(--gold-dk);text-transform:uppercase;text-align:left;
  padding:.85rem 1rem;
  background:rgba(201,168,76,.05);
  border-bottom:1px solid rgba(201,168,76,.12);
  white-space:nowrap;
}
.booking-table th:first-child{padding-left:1.4rem;}
.booking-table th:last-child{padding-right:1.4rem;text-align:center;}
.booking-table td{
  font-family:"Cormorant Garamond",serif;
  font-size:clamp(.78rem,2.3vw,.86rem);
  color:var(--soft);padding:.75rem 1rem;
  border-bottom:1px solid rgba(201,168,76,.06);
  vertical-align:middle;
}
.booking-table td:first-child{padding-left:1.4rem;}
.booking-table td:last-child{padding-right:1.4rem;text-align:center;}
.booking-table tr:last-child td{border-bottom:none;}
.booking-table tr:hover td{background:rgba(201,168,76,.03);}

.ref-badge{
  font-family:Cinzel,serif;font-size:.48rem;letter-spacing:.1em;
  color:var(--gold);background:rgba(201,168,76,.1);
  padding:.2em .55em;border-radius:4px;border:1px solid rgba(201,168,76,.2);
}
.status-badge{
  font-family:Cinzel,serif;font-size:.42rem;letter-spacing:.1em;
  padding:.22em .65em;border-radius:40px;
  display:inline-block;text-transform:uppercase;white-space:nowrap;
}
.status-badge.active{
  color:var(--green);background:rgba(76,175,112,.12);border:1px solid rgba(76,175,112,.2);
}
.status-badge.cancelled{
  color:var(--red);background:rgba(224,82,82,.1);border:1px solid rgba(224,82,82,.18);
  text-decoration:line-through;
}
.action-btn{
  background:transparent;border:1px solid rgba(224,82,82,.3);
  color:#e05252;font-family:Cinzel,serif;font-size:.42rem;
  letter-spacing:.1em;text-transform:uppercase;
  padding:.28em .65em;border-radius:6px;cursor:pointer;
  transition:all .3s var(--ease);
}
.action-btn:hover{background:rgba(224,82,82,.1);border-color:rgba(224,82,82,.5);}
.action-btn:disabled{opacity:.3;cursor:not-allowed;}
.empty-row td{
  text-align:center;color:var(--muted);padding:3rem 1rem;
  font-family:"Cormorant Garamond",serif;font-size:.9rem;font-style:italic;
  letter-spacing:.08em;
}

/* TOAST */
.toast{
  position:fixed;bottom:1.5rem;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:rgba(20,18,14,.97);border:1px solid var(--gold-bdr);
  color:var(--soft);font-family:Cinzel,serif;font-size:.5rem;
  letter-spacing:.14em;padding:.75rem 1.5rem;border-radius:40px;
  opacity:0;transition:all .4s var(--ease);
  z-index:9999;pointer-events:none;white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,.6);
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* MODAL */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:8888;
  background:rgba(0,0,0,.78);backdrop-filter:blur(5px);
  align-items:center;justify-content:center;padding:1rem;
}
.modal-overlay.open{display:flex;}
.modal{
  background:linear-gradient(160deg,rgba(20,18,14,.99),rgba(12,11,8,.99));
  border:1px solid var(--gold-bdr);border-radius:20px;
  padding:1.8rem 1.6rem;max-width:440px;width:100%;
  box-shadow:0 12px 60px rgba(0,0,0,.8);
  position:relative;
}
.modal::before{
  content:"";position:absolute;top:-1px;left:24px;width:32px;height:2px;
  background:linear-gradient(90deg,var(--gold),transparent);border-radius:1px;
}
.modal h3{
  font-family:"Cormorant Garamond",serif;
  font-size:clamp(1.05rem,3.5vw,1.25rem);font-weight:300;
  letter-spacing:.1em;color:var(--soft);margin-bottom:1.2rem;
}
.detail-rows{margin-bottom:1.3rem;}
.detail-row{
  display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;
  padding:.52rem 0;border-bottom:1px solid rgba(201,168,76,.07);
  font-family:"Cormorant Garamond",serif;font-size:.88rem;
}
.detail-row:last-child{border-bottom:none;}
.detail-key{color:var(--muted);font-size:.76rem;letter-spacing:.04em;flex-shrink:0;padding-top:.1rem;}
.detail-val{color:var(--soft);text-align:right;font-size:.9rem;word-break:break-word;}
.modal-actions{display:flex;gap:.7rem;justify-content:flex-end;flex-wrap:wrap;}
.btn-ghost{
  font-family:Cinzel,serif;font-size:.46rem;letter-spacing:.14em;
  text-transform:uppercase;color:var(--muted);
  background:transparent;border:1px solid rgba(110,110,110,.3);
  padding:.65rem 1.1rem;border-radius:40px;cursor:pointer;transition:all .3s;
}
.btn-ghost:hover{border-color:var(--muted);color:var(--soft);}
.btn-danger{
  font-family:Cinzel,serif;font-size:.46rem;letter-spacing:.14em;
  text-transform:uppercase;color:#fff;
  background:linear-gradient(135deg,#c94c4c,#a03030);
  border:none;padding:.65rem 1.2rem;border-radius:40px;cursor:pointer;transition:all .3s;
}
.btn-danger:hover{box-shadow:0 4px 18px rgba(201,60,60,.35);}
.btn-danger:disabled{opacity:.35;cursor:not-allowed;box-shadow:none;}

@media(max-width:520px){
  .filter-input{width:100%;}
  .toolbar-left{width:100%;}
  .toolbar{flex-direction:column;align-items:flex-start;}
}
</style>
</head>
<body>

<header class="admin-header">
  <div class="admin-logo">
    <span>HANTUNG PERFUME STUDIO</span>
    預約管理後台
  </div>
  <div class="header-right">
    <span class="header-note">⚠ 請使用與預約頁面相同的瀏覽器開啟</span>
    <span class="header-badge">Admin Dashboard</span>
  </div>
</header>

<main class="main">

  <!-- NOTICE -->
  <div class="notice-banner">
    <div class="notice-icon">ℹ</div>
    <div class="notice-text">
      此後台透過 <strong>瀏覽器本地儲存（localStorage）</strong> 讀取預約資料。<br>
      請確認您使用的是<strong>與客人預約頁面相同的裝置與瀏覽器</strong>，資料才能正常顯示。<br>
      如需跨裝置管理，建議將兩個 HTML 檔案放至同一網站（相同網域）使用。
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">總預約筆數</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statActive" style="color:var(--green)">0</div>
      <div class="stat-label">有效預約</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statCancelled" style="color:var(--red)">0</div>
      <div class="stat-label">已取消</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statToday" style="color:var(--blue)">0</div>
      <div class="stat-label">今日預約</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="toolbar-left">
      <input class="filter-input" id="searchInput" type="text"
             placeholder="搜尋姓名、電話、編號…" oninput="renderTable()">
      <select class="filter-sel" id="statusFilter" onchange="renderTable()">
        <option value="">全部狀態</option>
        <option value="active">有效</option>
        <option value="cancelled">已取消</option>
      </select>
      <select class="filter-sel" id="dateFilter" onchange="renderTable()">
        <option value="">全部日期</option>
      </select>
    </div>
    <div style="display:flex;gap:.6rem;align-items:center;">
      <button class="btn-tool" onclick="exportCSV()">匯出 CSV</button>
      <button class="btn-tool refresh" onclick="renderAll()">↻ 重整資料</button>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <div class="table-scroll">
      <table class="booking-table" id="bookingTable">
        <thead>
          <tr>
            <th>預約編號</th>
            <th>日期</th>
            <th>時段</th>
            <th>姓名</th>
            <th>電話</th>
            <th>信箱</th>
            <th>人數</th>
            <th>備註</th>
            <th>狀態</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr class="empty-row">
            <td colspan="10">正在讀取資料…</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</main>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <h3 id="modalRef">預約詳情</h3>
    <div class="detail-rows" id="modalRows"></div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">關閉</button>
      <button class="btn-danger" id="modalCancelBtn" onclick="cancelFromModal()">取消此預約</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ── Storage Keys (must match booking page) ── */
const BK_KEY  = 'hantung_v6';
const REF_KEY = 'hantung_refs_v6';

function getBookings() {
  try { return JSON.parse(localStorage.getItem(BK_KEY) || '{}'); } catch { return {}; }
}
function getRefs() {
  try { return JSON.parse(localStorage.getItem(REF_KEY) || '{}'); } catch { return {}; }
}

/* ── Build flat row array ── */
function buildRows() {
  const refs = getRefs();
  const bks  = getBookings();
  return Object.entries(refs).map(([ref, info]) => {
    const slotKey = info.slot || '';
    const isActive = !!(bks[info.date] && bks[info.date][slotKey]);
    return {
      ref,
      date:    info.date    || '',
      slot:    slotKey.replace('-', ' – '),
      name:    info.name    || '—',
      phone:   info.phone   || '—',
      email:   info.email   || '—',
      people:  info.people  || '—',
      note:    info.note    || '無',
      status:  info.cancelled ? 'cancelled' : 'active',
    };
  });
}

/* ── Render ── */
let allRows = [];
let currentModalRef = null;

function renderAll() {
  allRows = buildRows();
  // Sort: active first, then date desc
  allRows.sort((a, b) => {
    if (a.status !== b.status) return a.status === 'active' ? -1 : 1;
    return b.date.localeCompare(a.date);
  });
  updateStats();
  buildDateFilter();
  renderTable();
}

function updateStats() {
  const today = new Date().toISOString().slice(0, 10);
  const active    = allRows.filter(r => r.status === 'active');
  const cancelled = allRows.filter(r => r.status === 'cancelled');
  const todayRows = active.filter(r => r.date === today);
  document.getElementById('statTotal').textContent     = allRows.length;
  document.getElementById('statActive').textContent    = active.length;
  document.getElementById('statCancelled').textContent = cancelled.length;
  document.getElementById('statToday').textContent     = todayRows.length;
}

function buildDateFilter() {
  const sel = document.getElementById('dateFilter');
  const cur = sel.value;
  const dates = [...new Set(allRows.map(r => r.date).filter(Boolean))].sort().reverse();
  sel.innerHTML = '<option value="">全部日期</option>' +
    dates.map(d => `<option value="${d}">${fmtDisp(d)}</option>`).join('');
  if (cur) sel.value = cur;
}

function renderTable() {
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const date   = document.getElementById('dateFilter').value;

  let rows = allRows.filter(r => {
    if (status && r.status !== status) return false;
    if (date   && r.date   !== date)   return false;
    if (search) {
      const hay = (r.ref + r.name + r.phone + r.email).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  const tbody = document.getElementById('tableBody');
  if (!rows.length) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="10">
      ${search || status || date ? '沒有符合條件的預約' : '尚無預約資料 — 請確認使用相同瀏覽器開啟此頁面'}
    </td></tr>`;
    return;
  }

  tbody.innerHTML = rows.map(r => `
    <tr>
      <td><span class="ref-badge">${r.ref}</span></td>
      <td style="white-space:nowrap">${fmtDisp(r.date)}</td>
      <td style="white-space:nowrap">${r.slot}</td>
      <td>${escHtml(r.name)}</td>
      <td style="white-space:nowrap">${escHtml(r.phone)}</td>
      <td style="color:var(--muted);font-size:.8em">${escHtml(r.email)}</td>
      <td style="text-align:center">${escHtml(r.people)}</td>
      <td style="color:var(--muted);font-size:.82em;max-width:120px;
                 overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
          title="${escHtml(r.note)}">${escHtml(r.note)}</td>
      <td>
        <span class="status-badge ${r.status}">
          ${r.status === 'active' ? '有效' : '已取消'}
        </span>
      </td>
      <td>
        <button class="action-btn" onclick="openModal('${r.ref}')"
          ${r.status === 'cancelled' ? 'disabled' : ''}>
          ${r.status === 'cancelled' ? '已取消' : '詳情'}
        </button>
      </td>
    </tr>
  `).join('');
}

/* ── Modal ── */
function openModal(ref) {
  const row = allRows.find(r => r.ref === ref);
  if (!row) return;
  currentModalRef = ref;
  document.getElementById('modalRef').textContent = '預約編號：' + ref;
  const fields = [
    ['日期', fmtDisp(row.date)],
    ['時段', row.slot],
    ['姓名', row.name],
    ['電話', row.phone],
    ['信箱', row.email],
    ['人數', row.people],
    ['備註', row.note],
    ['狀態', row.status === 'active' ? '✓ 有效' : '✗ 已取消'],
  ];
  document.getElementById('modalRows').innerHTML = fields.map(([k, v]) =>
    `<div class="detail-row">
      <span class="detail-key">${k}</span>
      <span class="detail-val">${escHtml(String(v))}</span>
    </div>`
  ).join('');
  const cancelBtn = document.getElementById('modalCancelBtn');
  cancelBtn.disabled = row.status === 'cancelled';
  document.getElementById('detailModal').classList.add('open');
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('open');
  currentModalRef = null;
}

function cancelFromModal() {
  if (!currentModalRef) return;
  const ref = currentModalRef;
  const row = allRows.find(r => r.ref === ref);
  if (!row || row.status === 'cancelled') return;

  if (!confirm(`確定要取消預約 ${ref}（${row.name} / ${fmtDisp(row.date)} ${row.slot}）？`)) return;

  // Remove from booking slots
  const bks = getBookings();
  const slotKey = row.slot.replace(' – ', '-');
  if (bks[row.date] && bks[row.date][slotKey]) {
    delete bks[row.date][slotKey];
    if (!Object.keys(bks[row.date]).length) delete bks[row.date];
    localStorage.setItem(BK_KEY, JSON.stringify(bks));
  }

  // Mark as cancelled in refs
  const refs = getRefs();
  if (refs[ref]) {
    refs[ref].cancelled = true;
    localStorage.setItem(REF_KEY, JSON.stringify(refs));
  }

  closeModal();
  showToast(`✓ 預約 ${ref} 已取消，時段已釋放`);
  renderAll();
}

document.getElementById('detailModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

/* ── CSV Export ── */
function exportCSV() {
  if (!allRows.length) { showToast('沒有資料可匯出'); return; }
  const headers = ['預約編號','日期','時段','姓名','電話','信箱','人數','備註','狀態'];
  const csvRows = [headers.join(',')];
  for (const r of allRows) {
    csvRows.push([
      r.ref, r.date, '"' + r.slot + '"', r.name, r.phone,
      r.email, r.people,
      '"' + String(r.note).replace(/"/g, '""') + '"',
      r.status === 'active' ? '有效' : '已取消'
    ].join(','));
  }
  const blob = new Blob(['\uFEFF' + csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `HANTUNG_預約_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  showToast('✓ CSV 已匯出');
}

/* ── Helpers ── */
const DW = ['週日','週一','週二','週三','週四','週五','週六'];
function fmtDisp(ds) {
  if (!ds) return '—';
  try {
    const [y, m, d] = ds.split('-');
    return `${y}年${+m}月${+d}日（${DW[new Date(ds + 'T00:00:00').getDay()]}）`;
  } catch { return ds; }
}
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast on';
  clearTimeout(t._t);
  t._t = setTimeout(() => { t.className = 'toast'; }, 3200);
}

/* ── Init ── */
renderAll();

// Auto-refresh every 30 seconds
setInterval(renderAll, 30000);
</script>
</body>
